# ==============================================================================
# [인프라 설정] Longhorn 분산 스토리지 클래스 (기본 저장소)
# ------------------------------------------------------------------------------
# 목적: 
#   1. 8개 노드(마스터 1 + 워커 7) 클러스터 전체에 데이터 분산 저장 및 복제 제공.
#   2. 7840HS 미니 PC 및 윈도우 VM 환경에서 고가용성(HA) 보장.
#   3. 윈도우 VM 노드(worker1~4)의 일시적 장애나 시간 오차 시에도 데이터 안정성 확보.
# ==============================================================================

kind: StorageClass
apiVersion: storage.k8s.io/v1
metadata:
  name: longhorn
  annotations:
    # 💡 이 주석이 'true'여야 PVC 생성 시 storageClassName을 생략해도 롱혼으로 자동 할당됩니다.
    # 카프카(Kafka)나 프로메테우스 등을 설치할 때 매우 편리합니다.
    storageclass.kubernetes.io/is-default-class: "true"
    
provisioner: driver.longhorn.io # 롱혼 CSI 드라이버 사용

# 💡 볼륨 생성 후에도 실시간으로 용량을 늘릴 수 있도록 허용 (Disk 0 오류 대비 및 유연한 운영)
allowVolumeExpansion: true

# 💡 PVC(사용 요청)가 삭제되면 실제 데이터(PV)도 함께 삭제하여 디스크 찌꺼기를 방지함.
# (중요한 데이터는 별도로 Retain 설정을 고려하거나 백업 정책 활용 권장)
reclaimPolicy: Delete

# 💡 파드가 스케줄링되기 전에 볼륨부터 즉시 생성. 
# 8개 노드 중 어디서든 데이터를 끌어올 수 있는 롱혼의 분산 구조에 최적화됨.
volumeBindingMode: Immediate

parameters:
  # 💡 [핵심] 데이터 복제본 개수: 3개
  # - 현재 7개의 워커 노드 중 3곳에 데이터를 분산 저장합니다.
  # - 노드 하나(특히 윈도우 VM)가 죽어도 나머지 2곳에 데이터가 있어 서비스 중단이 없습니다.
  numberOfReplicas: "3" 

  # 💡 [핵심] 장애 발생 시 대기 시간: 2880분 (48시간)
  # - 노드가 'NotReady'가 되었을 때, 복제본을 즉시 다른 노드로 옮기지 않고 기다리는 시간입니다.
  # - 윈도우 VM의 시간 동기화 문제나 일시적 리부팅 시 불필요한 데이터 재복제(I/O 부하)를 막아줍니다.
  staleReplicaTimeout: "2880" 

  # 💡 데이터 복제 정책: 롱혼이 알아서 노드별/존별로 균등하게 배분하도록 설정
  fromBackup: ""
  fsType: "ext4"
