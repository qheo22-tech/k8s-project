apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-web-app
  namespace: ai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-web-app
  template:
    metadata:
      labels:
        app: ai-web-app
    spec:
      containers:
      - name: web-container
        image: qheo22/ai-web-app:v18 # 👈 최신 이미지 확인
        ports:
        - containerPort: 8000
        env:
        - name: GPU_SERVER_URL
          value: "http://192.168.0.47:8000/v1/chat/completions"
        - name: MODEL_NAME
          value: "/models/Llama-3-Open-Ko-8B-Instruct-preview"
        - name: TRAINING_SERVER_URL
          value: "http://gpu-training-service.ai-service.svc.cluster.local:9000/upload"
        - name: MAX_TOKENS
          value: "512"
        - name: TEMPERATURE
          value: "0.2"

        # 🚀 [수정] 볼륨 관련 설정(volumeMounts)을 모두 삭제했습니다.
        
        resources:
          requests:
            cpu: "500m"
            memory: "511Mi"
          limits:
            cpu: "1"
            memory: "1Gi"

        # 🚀 [수정] 헬스 체크 경로를 / 로 수정 (CrashLoop 방지)
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10

      # 🚀 [수정] 하단 volumes 섹션도 모두 삭제했습니다.
