apiVersion: v1
kind: Service
metadata:
  name: ai-was-service
  namespace: ai-service  # <--- Deployment와 동일하게 변경
spec:
  type: NodePort
  selector:
    app: ai-was         # Deployment의 matchLabels와 일치해야 함
  ports:
    - protocol: TCP
      port: 80          # 서비스 내부 포트 (ClusterIP)
      targetPort: 8000  # 파이썬(FastAPI) 컨테이너 포트
      nodePort: 30080   # 외부 접속용 포트 (미니PC_IP:30080)
