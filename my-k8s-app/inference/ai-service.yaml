apiVersion: v1
kind: Service
metadata:
  name: ai-inference-service
  namespace: ai-service
spec:
  type: NodePort  # ClusterIP → NodePort
  selector:
    app: ai-inference
  ports:
  - port: 8000         # Service 내부 포트
    targetPort: 8000   # Pod 컨테이너 포트
    nodePort: 30100    # 외부에서 접근할 포트 (30000~32767 사이)
