# =========================================================
# [PostgreSQL 외부 접속 전용 서비스]
# 1. 용도: 클러스터 외부(DBeaver, 데이터 분석 툴, LLM PC)에서 DB 직접 접속
# 2. 특징: 
#    - MetalLB를 통해 공유기 대역의 고정 IP 할당 (LoadBalancer)
#    - CNPG 클러스터 중 'Primary(Master)' 팟으로만 트래픽 유도 (쓰기 가능)
# 3. 주의: 보안을 위해 외부 IP 노출 시 방화벽(IP 허용) 설정 권장
# =========================================================
apiVersion: v1
kind: Service
metadata:
  name: my-postgres-external
  namespace: database
spec:
  type: LoadBalancer
  selector:
    cnpg.io/cluster: my-postgres
    role: primary
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
